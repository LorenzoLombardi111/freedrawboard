<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gold rounded background, matching freepage / freeslides style -->
  <rect width="32" height="32" rx="6" fill="#C49A2A"/>
  <!-- White whiteboard surface -->
  <rect x="5" y="7" width="22" height="18" rx="2" fill="#fff"/>
  <!-- Drawn freehand stroke -->
  <path d="M8 17 C 11 12, 14 22, 17 16 S 22 14, 24 17" stroke="#1a1917" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
