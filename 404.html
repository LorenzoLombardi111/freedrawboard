<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — freedrawboard.app</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #faf9f6; --accent: #C49A2A; --accent-hover: #A8831F; --text-primary: #1a1917; --text-secondary: #6b6760; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text-primary); font-family: "Lora", serif; }
        .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
        h1 { font-family: "DM Sans", sans-serif; font-size: 96px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
        h2 { font-family: "DM Sans", sans-serif; font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        p { color: var(--text-secondary); max-width: 440px; margin-bottom: 32px; }
        a.home { font-family: "DM Sans", sans-serif; font-size: 15px; font-weight: 500; background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; }
        a.home:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>That board doesn't exist. Head back to the home page to start a new collaborative whiteboard.</p>
        <a class="home" href="/">Back to freedrawboard.app</a>
    </div>
</body>
</html>
